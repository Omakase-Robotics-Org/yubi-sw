# =============================================================================
# Storage Targets — Upload + GC Configuration (yubi)
# =============================================================================

# Path to the SQLite state database.
state_db: "/opt/data/upload_state.db"

# Purge terminal-state rows (completed, gc_deleted) older than this (hours).
state_purge_age_hours: 240    # 10 days

# Delete local recording after successful upload to all required targets.
delete_after_upload: true

# Hours to keep local recordings before age-based cleanup.
local_retention_hours: 24

# =============================================================================
# Default values inherited by all targets
# =============================================================================
defaults:
  use_ssl: false
  verify_ssl: true
  bucket: "data"
  prefix: ""
  path_rule: "canonical"
  priority: "required"

# =============================================================================
# Targets
# =============================================================================
targets:

  # ---------------------------------------------------------------------------
  # Local MinIO — primary storage on the robot
  # ---------------------------------------------------------------------------
  local:
    endpoint: "localhost:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    path_rule: "canonical"
    priority: "required"

    gc:
      strategy:
        - marker
        - any_of:
            - age
            - space
      max_age_hours: 24.0
      max_storage_gb: 100.0
      orphan_age_hours: 1.0
      check_interval_sec: 300
