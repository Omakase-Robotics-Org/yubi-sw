# Stationary (yagura) — overlay onto common/recording_gate.yaml
# Adds head camera (RealSense) timeout + rate conditions.

groups:
  health:
    conditions:
      # Head camera: topic stopped → warn at 1s, stop at 3s
      head_camera_timeout_warn:
        topic: /camera/camera/color/image_raw/compressed
        timeout_sec: 1.0
        escalation: 1

      head_camera_timeout_stop:
        topic: /camera/camera/color/image_raw/compressed
        timeout_sec: 3.0
        escalation: 2

      # Head camera: < 10 Hz → warning (BLOCK_START), < 5 Hz → stop (HARD_STOP)
      head_camera_warn:
        topic: /camera/camera/color/image_raw/compressed
        timeout_sec: 3.0
        min_rate_hz: 10.0
        rate_window_sec: 5.0
        rate_escalation: 1
        debounce_sec: 0.5
        reason: "Head camera frame rate below 10 Hz ({detail})"

      head_camera_stop:
        topic: /camera/camera/color/image_raw/compressed
        timeout_sec: 3.0
        min_rate_hz: 5.0
        rate_window_sec: 5.0
        rate_escalation: 2
        debounce_sec: 0.5
        reason: "Head camera frame rate below 5 Hz ({detail})"
