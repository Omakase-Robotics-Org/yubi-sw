# Portable — overlay onto common/recording_gate.yaml
# Adds head camera (USB cam @ ~60 Hz) timeout + rate conditions.
# Thresholds are reduced from hand cameras (60 Hz warn / 30 Hz stop) because the frequency of the head camera is lower.

groups:
  health:
    conditions:
      # Head camera (USB): topic stopped → warn at 1s, stop at 3s
      head_camera_timeout_warn:
        topic: /center_camera/camera_info
        timeout_sec: 1.0
        escalation: 1

      head_camera_timeout_stop:
        topic: /center_camera/camera_info
        timeout_sec: 3.0
        escalation: 2

      # Head camera: < 30 Hz → warning (BLOCK_START), < 15 Hz → stop (HARD_STOP)
      head_camera_warn:
        topic: /center_camera/camera_info
        timeout_sec: 3.0
        min_rate_hz: 30.0
        rate_window_sec: 5.0
        rate_escalation: 1
        debounce_sec: 0.5
        reason: "Center (USB) camera frame rate below 30 Hz ({detail})"

      head_camera_stop:
        topic: /center_camera/camera_info
        timeout_sec: 3.0
        min_rate_hz: 15.0
        rate_window_sec: 5.0
        rate_escalation: 2
        debounce_sec: 0.5
        reason: "Center (USB) camera frame rate below 15 Hz ({detail})"
